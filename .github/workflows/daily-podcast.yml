name: Daily Podcast Pipeline

on:
  schedule:
    # JST 7:00 = UTC 22:00 (前日)
    - cron: "0 22 * * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-latest
        ports:
          - 50021:50021

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

     - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Wait for VOICEVOX engine to be ready
        run: |
          echo "VOICEVOXエンジン起動待機中..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:50021/version; then
              echo ""
              echo "VOICEVOXエンジン起動完了"
              break
            fi
            echo "待機中... ($i/36)"
            sleep 5
          done

      - name: Step 1 - Fetch Chiangmai news
        run: python scripts/01_fetch_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Step 2 - Generate Japanese script with Claude
        run: python scripts/02_generate_script.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Step 3 - Synthesize audio with VOICEVOX
        run: python scripts/03_synthesize_audio.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Step 4 - Upload MP3 to Cloudflare R2
        run: python scripts/04_upload_r2.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Step 5 - Update RSS feed
        run: python scripts/05_generate_rss.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Commit and push updated feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "🎙️ $(date +'%Y-%m-%d') エピソード自動生成"
          git push
